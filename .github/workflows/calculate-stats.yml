name: Calculate Statistics

on:
  push:
    branches:
      - main
    paths:
      - 'nankan/results/**/*.json'
      - 'nankan/predictions/**/*.json'
  workflow_dispatch:  # 手動トリガー許可

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Calculate statistics
        run: |
          echo "📊 統計計算を開始します..."
          npm run calc-stats

          if [ $? -eq 0 ]; then
            echo "✅ 統計計算完了"
          else
            echo "❌ 統計計算失敗"
            exit 1
          fi

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet stats/nankan-stats.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  統計データに変更なし"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 統計データが更新されました"
          fi

      - name: Commit statistics
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add stats/nankan-stats.json
          git commit -m "📊 統計自動更新 [Auto-updated by GitHub Actions]"
          git push

      - name: Summary
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          echo "✅ 統計データを自動更新しました"
          echo "📈 Netlifyで自動デプロイが開始されます"
