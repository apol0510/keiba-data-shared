name: Dispatch Results to keiba-intelligence

on:
  push:
    branches:
      - main
    paths:
      - 'nankan/results/**/*.json'

concurrency:
  group: dispatch-nankan-results-${{ github.sha }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed result files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep 'nankan/results/.*\.json' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📊 No result files changed"
            exit 0
          fi

          # 各ファイルのレース数をチェック
          DATES_ARRAY="["
          FIRST=true
          ALL_COMPLETE=true

          while IFS= read -r file; do
            DATE=$(basename "$file" .json)

            # 会場別ファイル（-OOI, -FUN, -KAW, -URA）をスキップ（統合ファイルのみ処理）
            if [[ "$DATE" =~ -[A-Z]{3}$ ]]; then
              echo "⏭️  スキップ: $DATE（会場別ファイル）"
              continue
            fi

            # JSONファイルのレース数をチェック
            RACE_COUNT=$(cat "$file" | jq '.races | length')

            echo "📋 $DATE: $RACE_COUNT レース"

            if [ "$RACE_COUNT" -lt 12 ]; then
              echo "⏳ スキップ: $DATE は ${RACE_COUNT}レースのみ（12レース未満）"
              ALL_COMPLETE=false
              continue
            fi

            echo "✅ 完了: $DATE は12レース揃っています"

            # 12レース揃ったファイルのみdates配列に追加
            if [ "$FIRST" = true ]; then
              DATES_ARRAY="${DATES_ARRAY}\"${DATE}\""
              FIRST=false
            else
              DATES_ARRAY="${DATES_ARRAY},\"${DATE}\""
            fi
          done <<< "$CHANGED_FILES"
          DATES_ARRAY="${DATES_ARRAY}]"

          # 12レース揃ったファイルがあるかチェック
          if [ "$DATES_ARRAY" = "[]" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  全ファイルが12レース未満のためスキップ（速報のみ）"
            exit 0
          fi

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "dates=$DATES_ARRAY" >> $GITHUB_OUTPUT
          echo "🎯 Dispatch対象: $DATES_ARRAY"

      - name: Dispatch to keiba-intelligence
        if: steps.changed-files.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INTELLIGENCE_REPO_DISPATCH_TOKEN }}
          repository: apol0510/keiba-intelligence
          event-type: results-updated
          client-payload: |
            {
              "dates": ${{ steps.changed-files.outputs.dates }},
              "source": "keiba-data-shared",
              "trigger": "auto",
              "commit_sha": "${{ github.sha }}"
            }

      - name: Success notification
        if: steps.changed-files.outputs.changed == 'true'
        run: |
          echo "Dispatched results to keiba-intelligence"
          echo "   Dates: ${{ steps.changed-files.outputs.dates }}"
          echo "   Event type: results-updated"
          echo "   Target repo: apol0510/keiba-intelligence"

      - name: Skip notification
        if: steps.changed-files.outputs.changed != 'true'
        run: |
          echo "Skipped: No result files changed in this push"
