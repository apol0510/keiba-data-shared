name: Trigger Netlify Build on Data Update (南関・JRA)

on:
  push:
    branches:
      - main
    paths:
      - 'nankan/results/**/*.json'
      - 'nankan/predictions/**/*.json'
      - 'jra/results/**/*.json'
      - 'jra/predictions/**/*.json'

concurrency:
  group: trigger-netlify-${{ github.sha }}
  cancel-in-progress: true

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify Build Hook
        run: |
          echo "🚀 Netlifyビルドフックを呼び出します（南関・JRA結果/予想データ更新）..."
          response=$(curl -X POST -d {} -w "\nHTTP_CODE:%{http_code}" "${{ secrets.NETLIFY_BUILD_HOOK_URL }}")
          http_code=$(echo "$response" | grep "HTTP_CODE" | cut -d: -f2)

          if [ "$http_code" = "200" ] || [ "$http_code" = "204" ]; then
            echo "✅ Netlifyビルドを正常にトリガーしました (HTTP $http_code)"
            echo "📄 新しいページが5-10分以内に生成されます"
          else
            echo "❌ Netlifyビルドのトリガーに失敗しました (HTTP $http_code)"
            echo "Response: $response"
            exit 1
          fi
