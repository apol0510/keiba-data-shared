name: Merge JRA Prediction Files

on:
  push:
    branches:
      - main
    paths:
      - 'jra/predictions/**/*.json'
      - '!jra/predictions/computer/**'  # コンピ指数は除外

concurrency:
  group: merge-jra-predictions
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # git pushに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 差分確認用

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for venue-specific files and merge
        id: merge-check
        run: |
          # 更新されたファイルを取得（computerディレクトリを除外）
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep 'jra/predictions/.*\.json' | grep -v 'jra/predictions/computer/' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "merged=false" >> $GITHUB_OUTPUT
            echo "📊 No JRA prediction files changed (excluding computer index files)"
            exit 0
          fi

          # 会場コード付きファイル（-TKY.json等）が含まれているかチェック
          # computerディレクトリは除外
          VENUE_FILES=$(echo "$CHANGED_FILES" | grep -E 'jra/predictions/[0-9]{4}/[0-9]{2}/[0-9]{4}-[0-9]{2}-[0-9]{2}-[A-Z]{3}\.json' || true)

          if [ -z "$VENUE_FILES" ]; then
            echo "merged=false" >> $GITHUB_OUTPUT
            echo "⏭️  No venue-specific files found (already merged files only)"
            exit 0
          fi

          echo "📋 会場別ファイル検出:"
          echo "$VENUE_FILES"

          # 日付を抽出（重複排除）
          DATES=$(echo "$VENUE_FILES" | sed -E 's|.*/([0-9]{4}-[0-9]{2}-[0-9]{2})-[A-Z]{3}\.json|\1|' | sort -u)

          echo "🎯 統合対象日付:"
          echo "$DATES"

          MERGED_DATES=""
          while IFS= read -r date; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📅 $date の統合処理開始"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # merge-jra-predictions.js を実行
            node scripts/merge-jra-predictions.js "$date"

            if [ $? -eq 0 ]; then
              echo "✅ $date 統合完了"
              if [ -z "$MERGED_DATES" ]; then
                MERGED_DATES="$date"
              else
                MERGED_DATES="$MERGED_DATES, $date"
              fi
            else
              echo "❌ $date 統合失敗"
            fi
          done <<< "$DATES"

          if [ -n "$MERGED_DATES" ]; then
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "dates=$MERGED_DATES" >> $GITHUB_OUTPUT
          else
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit merged files
        if: steps.merge-check.outputs.merged == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # WORKFLOW_PATを使用してgit pushの認証を設定（他のワークフローをトリガーするため）
          git remote set-url origin https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/apol0510/keiba-data-shared.git

          git add jra/predictions/
          if git diff --cached --quiet; then
            echo "⏭️  No changes to commit (files already exist)"
          else
            DATES="${{ steps.merge-check.outputs.dates }}"
            git commit -m "🔄 JRA予想自動統合: ${DATES} [Auto-merged by GitHub Actions]"
            git pull --rebase origin main || true
            git push origin main
            echo "✅ Pushed merged files for: ${DATES}"
          fi

      - name: Convert dates to JSON array
        if: steps.merge-check.outputs.merged == 'true'
        id: convert-dates
        run: |
          # カンマ区切り文字列をJSON配列に変換
          DATES_STR="${{ steps.merge-check.outputs.dates }}"
          DATES_ARRAY="["
          FIRST=true
          IFS=', ' read -ra DATES <<< "$DATES_STR"
          for date in "${DATES[@]}"; do
            if [ "$FIRST" = true ]; then
              DATES_ARRAY="${DATES_ARRAY}\"${date}\""
              FIRST=false
            else
              DATES_ARRAY="${DATES_ARRAY},\"${date}\""
            fi
          done
          DATES_ARRAY="${DATES_ARRAY}]"
          echo "dates_json=$DATES_ARRAY" >> $GITHUB_OUTPUT
          echo "📅 Converted dates: $DATES_ARRAY"

      - name: Dispatch to keiba-intelligence
        if: steps.merge-check.outputs.merged == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INTELLIGENCE_REPO_DISPATCH_TOKEN }}
          repository: apol0510/keiba-intelligence
          event-type: prediction-updated
          client-payload: |
            {
              "dates": ${{ steps.convert-dates.outputs.dates_json }},
              "source": "keiba-data-shared",
              "venue": "jra",
              "category": "jra",
              "trigger": "auto-merge",
              "commit_sha": "${{ github.sha }}"
            }

      - name: Dispatch success notification
        if: steps.merge-check.outputs.merged == 'true'
        run: |
          echo "✅ Dispatched to keiba-intelligence"
          echo "   Event type: prediction-updated (category=jra)"
          echo "   Dates: ${{ steps.convert-dates.outputs.dates_json }}"
          echo "   Target repo: apol0510/keiba-intelligence"

      - name: Skip notification
        if: steps.merge-check.outputs.merged != 'true'
        run: |
          echo "⏭️  Skipped: No venue-specific files to merge"
