name: Dispatch JRA Prediction to keiba-intelligence

on:
  push:
    branches:
      - main
    paths:
      - 'jra/predictions/**/*.json'

concurrency:
  group: dispatch-jra-predictions-${{ github.sha }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 差分確認用

      - name: Get changed JRA prediction files
        id: changed-files
        run: |
          # 更新されたファイルを取得
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep 'jra/predictions/.*\.json' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📊 No JRA prediction files changed"
            exit 0
          fi

          # 各ファイルのレース数をチェック
          DATES_ARRAY="["
          FIRST=true

          while IFS= read -r file; do
            FILENAME=$(basename "$file" .json)

            # 会場コード付きファイル（2026-02-14-TKY.json）はスキップ
            if [[ "$FILENAME" =~ -[A-Z]{3}$ ]]; then
              echo "⏭️  スキップ: $FILENAME（会場別ファイル、統合ファイルで処理）"
              continue
            fi

            DATE="$FILENAME"

            # JSONファイルの構造をチェック（統合形式 or 単一会場形式）
            HAS_VENUES=$(cat "$file" | jq -r 'has("venues")' 2>/dev/null || echo "false")

            if [ "$HAS_VENUES" = "true" ]; then
              # 統合形式（venues配列）
              RACE_COUNT=$(cat "$file" | jq '.totalRaces // 0')
              echo "📋 $DATE (JRA統合): $RACE_COUNT レース"
            else
              # 単一会場形式（races配列）
              RACE_COUNT=$(cat "$file" | jq '.races | length')
              echo "📋 $DATE (JRA単一): $RACE_COUNT レース"
            fi

            if [ "$RACE_COUNT" -lt 12 ]; then
              echo "⏳ スキップ: $DATE は ${RACE_COUNT}レースのみ（12レース未満）"
              continue
            fi

            echo "✅ 完了: $DATE (JRA) は${RACE_COUNT}レース揃っています"

            # 12レース揃ったファイルのみdates配列に追加
            if [ "$FIRST" = true ]; then
              DATES_ARRAY="${DATES_ARRAY}\"${DATE}\""
              FIRST=false
            else
              DATES_ARRAY="${DATES_ARRAY},\"${DATE}\""
            fi
          done <<< "$CHANGED_FILES"
          DATES_ARRAY="${DATES_ARRAY}]"

          # 12レース揃ったファイルがあるかチェック
          if [ "$DATES_ARRAY" = "[]" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  全ファイルが12レース未満のためスキップ"
            exit 0
          fi

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "dates=$DATES_ARRAY" >> $GITHUB_OUTPUT
          echo "🎯 Dispatch対象 (JRA): $DATES_ARRAY"

      - name: Dispatch to keiba-intelligence
        if: steps.changed-files.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INTELLIGENCE_REPO_DISPATCH_TOKEN }}
          repository: apol0510/keiba-intelligence
          event-type: prediction-updated
          client-payload: |
            {
              "dates": ${{ steps.changed-files.outputs.dates }},
              "source": "keiba-data-shared",
              "venue": "jra",
              "category": "jra",
              "trigger": "auto",
              "commit_sha": "${{ github.sha }}"
            }

      - name: Success notification
        if: steps.changed-files.outputs.changed == 'true'
        run: |
          echo "✅ Dispatched JRA prediction to keiba-intelligence"
          echo "   Dates: ${{ steps.changed-files.outputs.dates }}"
          echo "   Event type: prediction-updated (category=jra)"
          echo "   Target repo: apol0510/keiba-intelligence"

      - name: Skip notification
        if: steps.changed-files.outputs.changed != 'true'
        run: |
          echo "⏭️  Skipped: No JRA prediction files changed in this push"
