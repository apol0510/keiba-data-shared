name: Dispatch JRA Results to keiba-intelligence

on:
  push:
    branches:
      - main
    paths:
      - 'jra/results/**/*.json'

concurrency:
  group: dispatch-jra-results-${{ github.sha }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed JRA result files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep 'jra/results/.*\.json' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📊 No JRA result files changed"
            exit 0
          fi

          # 各ファイルのレース数をチェック
          DATES_ARRAY="["
          FIRST=true
          ALL_COMPLETE=true

          while IFS= read -r file; do
            DATE=$(basename "$file" .json)

            # 会場別ファイル（-TOK, -KYO等）をスキップ（統合ファイルのみ処理）
            if [[ "$DATE" =~ -[A-Z]{3}$ ]]; then
              echo "⏭️  スキップ: $DATE（会場別ファイル）"
              continue
            fi

            # JSONファイルのレース数をチェック（中央競馬は10レース以上で処理）
            RACE_COUNT=$(cat "$file" | jq '.races | length')

            echo "📋 $DATE (JRA): $RACE_COUNT レース"

            if [ "$RACE_COUNT" -lt 10 ]; then
              echo "⏳ スキップ: $DATE は ${RACE_COUNT}レースのみ（10レース未満）"
              ALL_COMPLETE=false
              continue
            fi

            if [ "$RACE_COUNT" -ge 10 ] && [ "$RACE_COUNT" -lt 12 ]; then
              echo "⚠️  注意: $DATE は ${RACE_COUNT}レース（レース中止・天候不良の可能性）"
            fi

            echo "✅ 完了: $DATE (JRA) は${RACE_COUNT}レース揃っています"

            # 12レース揃ったファイルのみdates配列に追加
            if [ "$FIRST" = true ]; then
              DATES_ARRAY="${DATES_ARRAY}\"${DATE}\""
              FIRST=false
            else
              DATES_ARRAY="${DATES_ARRAY},\"${DATE}\""
            fi
          done <<< "$CHANGED_FILES"
          DATES_ARRAY="${DATES_ARRAY}]"

          # 12レース揃ったファイルがあるかチェック
          if [ "$DATES_ARRAY" = "[]" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  全ファイルが12レース未満のためスキップ（速報のみ）"
            exit 0
          fi

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "dates=$DATES_ARRAY" >> $GITHUB_OUTPUT
          echo "🎯 Dispatch対象 (JRA): $DATES_ARRAY"

      - name: Dispatch to keiba-intelligence (with retry)
        if: steps.changed-files.outputs.changed == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "📤 Dispatching to keiba-intelligence..."
            gh api repos/apol0510/keiba-intelligence/dispatches \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -f event_type='results-jra-updated' \
              -f "client_payload={\"dates\":${{ steps.changed-files.outputs.dates }},\"source\":\"keiba-data-shared\",\"venue\":\"jra\",\"trigger\":\"auto\",\"commit_sha\":\"${{ github.sha }}\"}"
        env:
          GH_TOKEN: ${{ secrets.INTELLIGENCE_REPO_DISPATCH_TOKEN }}

      - name: Success notification
        if: steps.changed-files.outputs.changed == 'true'
        run: |
          echo "✅ Dispatched JRA results to keiba-intelligence"
          echo "   Dates: ${{ steps.changed-files.outputs.dates }}"
          echo "   Event type: results-jra-updated"
          echo "   Target repo: apol0510/keiba-intelligence"
          echo "   Commit: ${{ github.sha }}"
          echo "   Triggered by: ${{ github.actor }}"
          echo ""
          echo "📋 Dispatch details:"
          echo "   - Repository: apol0510/keiba-intelligence"
          echo "   - Event type: results-jra-updated"
          echo "   - Dates: ${{ steps.changed-files.outputs.dates }}"
          echo "   - Source: keiba-data-shared"
          echo "   - Venue: jra"
          echo ""
          echo "🔍 To verify dispatch was received:"
          echo "   gh run list --repo apol0510/keiba-intelligence --workflow import-results-jra.yml --limit 3"

      - name: Skip notification
        if: steps.changed-files.outputs.changed != 'true'
        run: |
          echo "⏭️  Skipped: No JRA result files changed in this push"

      - name: Failure alert
        if: failure()
        run: |
          echo "🚨 Dispatch failed!"
          echo "   Dates: ${{ steps.changed-files.outputs.dates }}"
          echo "   Target: apol0510/keiba-intelligence"
          echo "   Event: results-jra-updated"
          echo ""
          echo "⚠️  Manual action required:"
          echo "   cd /path/to/keiba-intelligence"
          echo "   gh workflow run import-results-jra.yml -f date=YYYY-MM-DD"
